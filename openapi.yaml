openapi: 3.0.0
info:
  title: Inventario API
  description: API para la gestión de inventario, compras y ventas.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Servidor de desarrollo
paths:
  /api/productos:
    get:
      summary: Listar Productos (con filtros)
      description: Obtiene todos los productos activos. Permite filtrar por nombre, sku y precioVenta exacto.
      parameters:
        - name: nombre
          in: query
          description: Filtrar por nombre (contiene)
          schema:
            type: string
        - name: sku
          in: query
          description: Filtrar por SKU (contiene)
          schema:
            type: string
        - name: precioVenta
          in: query
          description: Filtrar por precio exacto
          schema:
            type: number
            format: float
      responses:
        '200':
          description: Lista de productos recuperada exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Producto'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Crear Producto
      description: Crea un nuevo producto en la base de datos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Producto'
      responses:
        '201':
          description: Producto creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Producto'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/productos/{id}:
    get:
      summary: Obtener Producto por ID
      description: Obtiene los detalles de un producto específico por su ID.
      parameters:
        - name: id
          in: path
          required: true
          description: ID del producto a obtener
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Producto'
        '404':
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Actualizar Completo
      description: Actualiza todos los campos del producto.
      parameters:
        - name: id
          in: path
          required: true
          description: ID del producto a actualizar
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Producto'
      responses:
        '200':
          description: Producto actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Producto'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Eliminar Producto
      description: Realiza un borrado lógico (Soft Delete).
      parameters:
        - name: id
          in: path
          required: true
          description: ID del producto a eliminar
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Producto eliminado (inactivado) correctamente
        '404':
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Actualizar Parcialmente (PATCH)
      description: Actualiza solo los campos proporcionados en el JSON.
      parameters:
        - name: id
          in: path
          required: true
          description: ID del producto a modificar
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Producto'
      responses:
        '200':
          description: Producto actualizado parcialmente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Producto'
        '404':
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    Producto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        nombre:
          type: string
        sku:
          type: string
        descripcion:
          type: string
        precioCosto:
          type: number
          format: float
        precioVenta:
          type: number
          format: float
        stockTotal:
          type: integer
        activo:
          type: boolean
          default: true
        fechaCreacion:
          type: string
          format: date-time
          readOnly: true
      required:
        - nombre
        - sku
        - precioVenta
        - stockTotal
    ErrorResponse:
      type: object
      properties:
        codigo:
          type: integer
        mensaje:
          type: string
