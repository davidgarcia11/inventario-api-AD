# ========================================================================
# Configuración COMÚN — independiente del entorno
# ========================================================================
# Las propiedades específicas de cada entorno viven en:
#   - application-dev.properties  (desarrollo local)
#   - application-prod.properties (producción, lee de variables de entorno)
#
# Para sobreescribir el perfil activo:
#   ./gradlew bootRun --args='--spring.profiles.active=prod'
#   SPRING_PROFILES_ACTIVE=prod java -jar app.jar
# ========================================================================

spring.application.name=inventario-api-AD

# Perfil activo por defecto (desarrollo local)
spring.profiles.active=dev

# Puerto del servidor (mismo en todos los entornos por simplicidad académica)
server.port=8080

# Documentación OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
