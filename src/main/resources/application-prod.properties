# ========================================================================
# Perfil PROD — producción
# ========================================================================
# Todas las credenciales y la URL de la BD se inyectan vía variables de
# entorno. No hay valores por defecto deliberadamente: si falta alguna,
# la app no arranca, y eso es lo que queremos en producción.
#
# Variables requeridas:
#   DB_URL          jdbc:mariadb://<host>:<puerto>/<bbdd>
#   DB_USERNAME     usuario de la BD
#   DB_PASSWORD     contraseña del usuario
# ========================================================================

# Conexión a BD (sin valores por defecto: forzamos env vars)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Hibernate / JPA
# validate: la app arranca solo si el esquema coincide con las entidades.
# Las migraciones se gestionan aparte (manuales o Flyway/Liquibase en futuro).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Logging: silenciar trazas internas en producción
logging.level.root=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
