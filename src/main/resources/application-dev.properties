# ========================================================================
# Perfil DEV — desarrollo local
# ========================================================================
# MariaDB local con credenciales por defecto. La BD se recrea en cada
# arranque para iterar rápido durante el desarrollo y los tests.
#
# Las propiedades aceptan variables de entorno con default a localhost,
# de modo que:
#   - Si arrancas con ./gradlew bootRun --profile=dev en local, usa los
#     valores por defecto (localhost:3306, root/root) y conectas al
#     MariaDB de docker-compose.dev.yml.
#   - Si arrancas con docker compose y SPRING_PROFILE=dev en el .env,
#     usa las DB_URL/DB_USERNAME/DB_PASSWORD del contenedor (que apuntan
#     al servicio "mariadb" interno).
# ========================================================================

# Conexión a BD (con defaults para bootRun local)
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/inventario_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Hibernate / JPA
# create-drop: recrea el esquema cada arranque (cómodo en dev, prohibido en prod)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true
