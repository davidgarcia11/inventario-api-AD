name: Integration tests (Newman + MariaDB)

# Cuándo se ejecuta este workflow:
#   - En push a las ramas "long-lived" (main y develop) para validar
#     el código que ya está integrado.
#   - En cualquier pull_request hacia main/develop, sin importar
#     desde qué rama venga. Esto cubre todas las feature/**.
#
# Importante: no incluimos feature/** en el trigger push, porque si lo
# hiciéramos cada push a una feature dispararía DOS runs (uno por push
# y otro por pull_request) en cuanto hubiera PR abierto. Así nos
# aseguramos un único run por evento útil.
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Si llegan varios commits seguidos a la misma rama (o al mismo PR),
# cancelamos el run anterior antes de empezar el nuevo. Ahorra minutos
# de CI cuando estás iterando rápido.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Tests de integración con Newman
    runs-on: ubuntu-latest

    # Servicio MariaDB que arranca como contenedor sidecar.
    # GitHub Actions espera a que pase el healthcheck antes de
    # ejecutar los steps.
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: inventario_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Instalar Node 20 (necesario para Newman)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Newman
        run: npm install -g newman

      - name: Construir el JAR (saltamos los tests unitarios, ya se ejecutan en otro job)
        run: ./gradlew bootJar -x test

      - name: Arrancar la API en segundo plano (perfil dev)
        run: |
          nohup java -jar build/libs/inventario-api-AD-*.jar \
            > app.log 2>&1 &
          echo $! > app.pid
          echo "API arrancando con PID $(cat app.pid)"

      - name: Esperar a que la API responda en /api/auth/login
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null \
                 -X POST http://localhost:8080/api/auth/login \
                 -H "Content-Type: application/json" \
                 -d '{"username":"x","password":"x"}'; then
              echo "API arriba tras ${i} intentos"
              exit 0
            fi
            echo "Esperando a la API... (intento $i)"
            sleep 3
          done
          echo "La API no respondió en 90 segundos"
          cat app.log
          exit 1

      - name: Ejecutar Newman contra la API
        # -e local.postman_environment.json apunta a localhost:8080,
        # que es donde está corriendo el JAR arrancado en el step anterior.
        # Para correr la misma colección contra AWS, basta con cambiar el
        # environment a aws.postman_environment.json.
        run: |
          newman run "Inventario API - Integration Tests.postman_collection.json" \
            -e local.postman_environment.json \
            --reporters cli,junit \
            --reporter-junit-export newman-report.xml

      - name: Subir el log de la API si algo falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log

      - name: Subir el informe JUnit de Newman (siempre)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.xml

      - name: Parar la API
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill $(cat app.pid) 2>/dev/null || true
          fi
